name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-check:
    name: Rust Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: mcp-server

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Check
        run: cargo check

      - name: Test
        run: cargo test

  cpp-lint:
    name: C++ Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: cppcheck
        run: |
          sudo apt-get update && sudo apt-get install -y cppcheck
          cppcheck --language=c++ --std=c++17 \
            --enable=warning,performance \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            --suppress=cstyleCast \
            --error-exitcode=1 \
            arx-plugin/*.cpp arx-plugin/*.h
